<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UEPB Connect — Entrar</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<link rel="stylesheet" href="../css/login.css">
</head>
<body>

<div class="login-page">

  <!-- Coluna da marca -->
  <div class="brand-col">
    <div class="brand-logo">
      <i class="ti ti-leaf brand-logo-icon"></i>
      <div class="brand-logo-text">
        UEPB Connect
      </div>
    </div>

    <div class="brand-tagline">
      <p>Um portal desenvolvido pela comunidade acadêmica para conectar alunos da UEPB a oportunidades de estágio e emprego.</p>
    </div>

    <div class="brand-illustration" aria-hidden="true">
      <svg viewBox="0 0 340 220" xmlns="http://www.w3.org/2000/svg">
        <circle cx="170" cy="110" r="95" fill="rgba(255,255,255,.04)"/>
        <rect x="60" y="40" width="120" height="150" rx="14" fill="rgba(255,255,255,.08)" stroke="rgba(255,255,255,.18)"/>
        <rect x="76" y="60" width="88" height="10" rx="5" fill="rgba(255,255,255,.25)"/>
        <rect x="76" y="80" width="60" height="8" rx="4" fill="rgba(255,255,255,.15)"/>
        <rect x="76" y="98" width="88" height="34" rx="6" fill="rgba(91,155,240,.25)"/>
        <rect x="76" y="140" width="70" height="8" rx="4" fill="rgba(255,255,255,.15)"/>
        <rect x="76" y="156" width="50" height="8" rx="4" fill="rgba(255,255,255,.15)"/>
        <circle cx="235" cy="150" r="26" fill="rgba(255,255,255,.1)"/>
        <circle cx="235" cy="132" r="13" fill="rgba(255,255,255,.2)"/>
        <circle cx="278" cy="165" r="22" fill="rgba(91,155,240,.15)"/>
        <circle cx="278" cy="150" r="11" fill="rgba(91,155,240,.3)"/>
      </svg>
    </div>
  </div>

  <!-- Coluna do formulário -->
  <div class="form-col">
    <div class="login-form">
      <h1>Login</h1>
      <p class="login-sub">Acesse sua conta UEPB Connect:</p>

      <div class="form-error" id="login-error"></div>

      <div class="field">
        <label>E-mail institucional:</label>
        <input type="email" class="email" placeholder="nome@aluno.uepb.edu.br" autocomplete="email">
      </div>

      <div class="field">
        <label>Senha:</label>
        <div class="password-wrap">
          <input type="password" class="senha" id="senhaInput" placeholder="Sua senha" autocomplete="current-password">
          <button type="button" class="toggle-senha" id="toggleSenha" aria-label="Mostrar senha"><i class="ti ti-eye"></i></button>
        </div>
      </div>

      <button type="button" id="btnLogin" class="btn-acessar">Acessar</button>

      <a href="#" class="forgot-link">Esqueceu ou deseja alterar sua senha?</a>

      <div class="signup-block">
        <p>Ainda não tem conta?</p>
        <a href="../html/cadastro-passo1.html">Criar cadastro no UEPB Connect</a>
      </div>
    </div>
  </div>

</div>

<script src="../js/login.js"></script>
</body>
</html>

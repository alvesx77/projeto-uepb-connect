<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UEPB Connect — Cadastro (1/4)</title>
<link rel="stylesheet" href="css/index1.css">
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-logo">
    <div class="sidebar-logo-mark">UP</div>
    <div class="sidebar-logo-text">UEPB Connect<span>Portal do aluno</span></div>
  </div>
  <div class="step-list">
    <div class="step-item active">
      <div class="step-num">1</div>
      <div class="step-label">Dados pessoais<span>Nome, contato</span></div>
    </div>
    <div class="step-item pending">
      <div class="step-num">2</div>
      <div class="step-label">Acadêmico<span>Curso, período</span></div>
    </div>
    <div class="step-item pending">
      <div class="step-num">3</div>
      <div class="step-label">Perfil profissional<span>Áreas, tecnologias</span></div>
    </div>
    <div class="step-item pending">
      <div class="step-num">4</div>
      <div class="step-label">Redes e links<span>LinkedIn, GitHub</span></div>
    </div>
  </div>
</aside>

<main class="main">

  <div class="form-error" id="passo1-error"></div>

  <div class="card">
    <div class="card-title"><i class="ti ti-user"></i> Identificação</div>
    <div class="grid2">
      <div class="field full">
        <label>Nome completo <span class="req">*</span></label>
        <input type="text" class = "nomeCompleto" name="nome" placeholder="Ex.: Maria Aparecida Silva">
      </div>
      <div class="field">
        <label>E-mail institucional <span class="req">*</span></label>
        <input type="email" class = "email" name="email" placeholder="nome@aluno.uepb.edu.br">
        <div class="hint">Use apenas o e-mail fornecido pela UEPB</div>
      </div>
      <div class="field">
        <label>Telefone / WhatsApp <span class="req">*</span></label>
        <input type="tel" class = "telefone" name="telefone" placeholder="(83) 99999-9999">
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-title"><i class="ti ti-lock"></i> Acesso</div>
    <div class="grid2">
      <div class="field">
        <label>Senha <span class="req">*</span></label>
        <input type="password" class = "senha" name="senha" placeholder="Mínimo 8 caracteres">
      </div>
      <div class="field">
        <label>Confirmar senha <span class="req">*</span></label>
        <input type="password" class = "confirmarSenha" name="confirmarSenha" placeholder="Repita a senha">
      </div>
    </div>
  </div>

  <div class="btn-row">
    <button type="button" class="btn btn-primary" href = "cadastro-passo2.html">Próximo →</button>
  </div>
</main>
<script src="js/cadastroTela1.js"></script>
</body>
</html>
